name: agentsentry

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 — persistent telemetry store
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentsentry
      POSTGRES_USER: agentsentry
      POSTGRES_PASSWORD: changeme   # Override via .env or Docker secrets before production use
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # AgentScout — filesystem watcher
  # IMPORTANT: Mount the agent log directory from the source machine here.
  #   Option A (NFS/CIFS already mounted on Docker host):
  #     - /mnt/agent-logs:/data/agent-logs:ro
  #   Option B (directly from this machine if agent runs here):
  #     - ${AGENT_DATA_DIR:-~/.claude}:/data/agent-logs:ro
  # The container reads AGENT_DATA_DIR=/data/agent-logs at runtime.
  # -------------------------------------------------------------------------
  agent-scout:
    build:
      context: ../packages/agent-scout
      dockerfile: Dockerfile   # Phase 6
    restart: unless-stopped
    environment:
      AGENT_DATA_DIR: /data/agent-logs
      BEACON_URL: http://beacon:8001
    volumes:
      # Uncomment and set the correct source path for your environment:
      # - /host/path/to/.claude:/data/agent-logs:ro
      []
    depends_on:
      - beacon

  # -------------------------------------------------------------------------
  # Watchtower — FastAPI + PostgreSQL API
  # The Beacon (parser) runs in-process inside agent-scout — not a separate service.
  # -------------------------------------------------------------------------
  watchtower:
    build:
      context: ../packages/watchtower
      dockerfile: Dockerfile   # Phase 6
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://agentsentry:changeme@postgres:5432/agentsentry
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # AgentSentry Dashboard — Next.js (standalone output)
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: ../packages/dashboard
      dockerfile: Dockerfile   # Phase 6
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://watchtower:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      - watchtower

volumes:
  postgres_data:
    driver: local
