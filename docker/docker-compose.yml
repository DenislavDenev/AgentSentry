name: agentsentry

services:
  # -------------------------------------------------------------------------
  # Watchtower — FastAPI + SQLite API + Vite SPA + in-process JSONL watcher
  #
  # One service, one process, no Node runtime in production.
  #
  # IMPORTANT: Mount the agent log directory from the source machine.
  #   Option A (NFS/CIFS already mounted on Docker host):
  #     - /mnt/agent-logs:/data/agent-logs:ro
  #   Option B (agent runs on this same machine):
  #     - ${AGENT_DATA_DIR:-~/.claude}:/data/agent-logs:ro
  #   Option C (Proxmox LXC bind-mount — set up on the Proxmox host):
  #     mp0: /mnt/host/agent-logs,mp=/data/agent-logs,ro=1
  # -------------------------------------------------------------------------
  watchtower:
    build:
      context: ..
      dockerfile: packages/watchtower/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:////var/lib/agentsentry/agentsentry.db
      AGENT_DATA_DIR: /data/agent-logs
      STATE_DIR: /var/lib/agentsentry/scout
      # DASHBOARD_DIR is baked into the image at /app/dashboard-static;
      # the ENV in the Dockerfile sets this automatically for image-based runs.
      # Override here only if mounting a custom SPA build.
      # DASHBOARD_DIR: /app/dashboard-static
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and scout state across container restarts.
      - agentsentry_data:/var/lib/agentsentry
      # Uncomment one of the options above and set the correct source path:
      # - /host/path/to/.claude:/data/agent-logs:ro

volumes:
  agentsentry_data:
    driver: local
