[project]
name = "agent-scout"
version = "0.1.0"
description = "AgentSentry — filesystem watcher and incremental log collector"
requires-python = ">=3.12"
dependencies = [
    "watchdog>=4.0",
]

[project.scripts]
agent-scout = "agent_scout.__main__:main"

[dependency-groups]
dev = [
    "ruff>=0.4",
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_scout"]
