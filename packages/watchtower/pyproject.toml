[project]
name = "watchtower"
version = "0.1.0"
description = "AgentSentry — FastAPI backend, SQLite persistence layer"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "aiosqlite>=0.20",
    "alembic>=1.13",
    "sqlalchemy[asyncio]>=2.0",
    "pydantic-settings>=2.0",
    "watchdog>=4.0",
]

[project.scripts]
watchtower = "watchtower.__main__:main"

[dependency-groups]
dev = [
    "ruff>=0.4",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "anyio>=4.0",
    "httpx>=0.27",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/watchtower"]
