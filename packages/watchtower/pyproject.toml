[project]
name = "watchtower"
version = "0.1.0"
description = "AgentSentry — FastAPI backend and PostgreSQL persistence layer"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "sqlalchemy[asyncio]>=2.0",
    "pydantic-settings>=2.0",
]

[project.scripts]
watchtower = "watchtower.__main__:main"

[dependency-groups]
dev = [
    "ruff>=0.4",
    "pytest>=8.0",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/watchtower"]
